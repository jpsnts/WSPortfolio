        iframe {

            height: 600px;

        }

        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        .code-box {

            line-height: 1.6;
            resize: none; 
            box-sizing: border-box;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
        }
        .code-box::-webkit-scrollbar-track { background: #1E293B; }
        .code-box::-webkit-scrollbar-thumb { background: #475569; }
